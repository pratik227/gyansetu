  :root {
    /* ── Brand palette ── */
    --saffron: #FF9933;
    --saffron-deep: #F37820;
    --saffron-soft: #FFE4C7;
    --green: #138808;
    --green-deep: #0E6606;
    --green-soft: #D6F0D2;
    --sky: #4FC3F7;
    --sky-deep: #0288D1;
    --sky-soft: #E1F5FE;
    --pink: #FF6F91;
    --pink-deep: #D14570;
    --pink-soft: #FFE0E9;
    --yellow: #FFD43B;
    --yellow-deep: #D9A800;
    --yellow-soft: #FFF4C2;
    --purple: #9C6ADE;
    --purple-deep: #6E3FAB;
    --purple-soft: #EDE3FA;

    /* ── Neutral text + surface ── */
    --ink: #2A1810;              /* primary text */
    --ink-soft: #5C4A3E;         /* secondary / muted text */
    --bg: #FFFAF2;               /* screen background */
    --paper: #FFFFFF;            /* card surface */
    --line: rgba(42, 24, 16, 0.08);  /* hairline divider */
    --line-strong: rgba(42, 24, 16, 0.16);

    /* ── Spacing scale (4px base) ── */
    --sp-1: 4px;
    --sp-2: 8px;
    --sp-3: 12px;
    --sp-4: 16px;
    --sp-5: 20px;
    --sp-6: 24px;
    --sp-7: 32px;

    /* ── Border-radius scale ── */
    --r-xs: 8px;
    --r-sm: 12px;
    --r-md: 16px;
    --r-lg: 20px;
    --r-xl: 24px;
    --r-2xl: 32px;
    --r-pill: 999px;

    /* ── Border widths ── */
    --bw-hair: 1.5px;
    --bw: 2px;
    --bw-strong: 2.5px;
    --bw-bold: 3px;

    /* ── Chunky drop-shadow scale ── */
    --sh-sm: 0 3px 0 var(--ink);
    --sh-md: 0 4px 0 var(--ink);
    --sh-lg: 0 5px 0 var(--ink);
    --sh-xl: 0 6px 0 var(--ink);
    --sh-soft: 0 8px 24px rgba(42, 24, 16, 0.10);

    /* ── Type scale ──
       Sizes are multiplied by --fs-scale so the user-selected text-size
       (regular / large / xl) actually scales every text element that uses
       a token. App.js sets --fs-scale on the root wrapper. */
    --fs-scale: 1;
    --fs-xs:   calc(11px * var(--fs-scale));
    --fs-sm:   calc(12px * var(--fs-scale));
    --fs-md:   calc(13px * var(--fs-scale));
    --fs-base: calc(14px * var(--fs-scale));
    --fs-lg:   calc(16px * var(--fs-scale));
    --fs-xl:   calc(18px * var(--fs-scale));
    --fs-2xl:  calc(20px * var(--fs-scale));
    --fs-3xl:  calc(22px * var(--fs-scale));
    --fs-4xl:  calc(26px * var(--fs-scale));
    --fs-5xl:  calc(32px * var(--fs-scale));

    /* ── Semantic tokens ── */
    --text-primary: var(--ink);
    --text-muted: var(--ink-soft);
    --text-inverse: #fff;
    --color-success: var(--green);
    --color-success-soft: var(--green-soft);
    --color-warning: var(--yellow);
    --color-warning-soft: var(--yellow-soft);
    --color-error: var(--pink);
    --color-error-soft: var(--pink-soft);
    --color-info: var(--sky);
    --color-info-soft: var(--sky-soft);
    --color-accent: var(--saffron);
    --color-accent-soft: var(--saffron-soft);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {

    padding: 0;

    overflow: hidden;
    height: 100vh;
    height: 100dvh;
    overscroll-behavior: none;
  }

  #root {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    background: none;
    /* iOS-friendly: remove tap delay + ensure 44px tap targets via min-height

  input, textarea {
    font-family: inherit;
    /* Prevent iOS auto-zoom when input font-size < 16px */
    font-size: 16px;

  .gs-screen::-webkit-scrollbar { display: none; }

    width: 100%;
    height: 100%;
    border-radius: 36px;
    overflow: hidden;
    background: var(--bg);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .gs-notch {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 24px;
    background: #1a1a1a;
    border-radius: 14px;
    z-index: 100;
  }

  .gs-status {
    height: 38px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 24px 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    flex-shrink: 0;
  }
  .gs-status-icons { display: flex; gap: 5px; align-items: center; }

  .gs-home-bar {
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .gs-home-bar::after {
    content: '';
    width: 110px;
    height: 4px;
    border-radius: 2px;
    background: var(--ink);
    opacity: 0.85;
  }

  .gs-screen {
    flex: 1;
    overflow-y: auto;
    position: relative;
  }

  /* Mobile: full viewport, no frame.
     Triggers on small portrait phones, narrow tablets, and any short
     landscape phone where the 780px frame wouldn't fit. */
  @media (max-width: 480px),

         (orientation: landscape) and (max-height: 500px) {
    body { background: var(--bg); }
    .gs-phone {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }
    .gs-phone-screen { border-radius: 0; }
    .gs-notch { display: none; }
    .gs-status { display: none; }
    .gs-home-bar { display: none; }
  }

  /* Extra-small viewports (320–360px wide phones) — tighten spacing */
  @media (max-width: 360px) {
    :root {
      --sp-4: 12px;
      --sp-5: 16px;
      --sp-6: 20px;
    }
  }

  @keyframes flap-l {

    0% { transform: scale(0); }

  .press {

  .btn-chunky {

  /* Card surface — chunky outlined white card, the workhorse container */
  .gs-card {
    background: var(--paper);

    border: var(--bw) solid var(--line-strong);
    border-radius: var(--r-md);
    padding: var(--sp-3) var(--sp-4);

  .gs-card-tinted {
    border: var(--bw) solid currentColor;
    border-radius: var(--r-lg);
    padding: var(--sp-3) var(--sp-4);
  }

  /* Inline chip / pill — for stats, statuses, tags */
  .gs-chip {
    display: inline-flex;
    align-items: center;
    gap: var(--sp-1);
    padding: 3px var(--sp-3);
    border-radius: var(--r-pill);
    font-size: var(--fs-sm);
    font-weight: 700;
    line-height: 1.1;
  }

  /* Circular icon button — 44px tap target with chunky outline */
  .gs-icon-btn {
    width: 44px;
    height: 44px;
    border-radius: var(--r-pill);
    background: var(--paper);
    border: var(--bw-strong) solid var(--ink);
    box-shadow: var(--sh-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Typography utilities */
  .gs-h1 { font-size: var(--fs-3xl); font-weight: 800; color: var(--text-primary); line-height: 1.05; }
  .gs-h2 { font-size: var(--fs-2xl); font-weight: 800; color: var(--text-primary); line-height: 1.1; }
  .gs-h3 { font-size: var(--fs-lg); font-weight: 800; color: var(--text-primary); line-height: 1.15; }
  .gs-body { font-size: var(--fs-base); font-weight: 600; color: var(--text-primary); line-height: 1.35; }
  .gs-muted { font-size: var(--fs-md); font-weight: 600; color: var(--text-muted); line-height: 1.3; }
  .gs-tiny { font-size: var(--fs-xs); font-weight: 700; color: var(--text-muted); line-height: 1.2; }
  .gs-eyebrow {
    font-size: var(--fs-xs);
    font-weight: 800;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Screen content padding — gives every screen the same gutters */
  .gs-screen-pad { padding: var(--sp-4) var(--sp-4) var(--sp-4); }

  /* Header row used by every detail screen: back-button + title cluster */
  .gs-header {
    display: flex;
    align-items: center;
    padding: var(--sp-4) var(--sp-4) var(--sp-3);
    gap: var(--sp-3);
  }

  /* Focus ring (a11y) — applied via :focus-visible to avoid mouse-click rings */
  .press:focus-visible,
  .gs-icon-btn:focus-visible {
    outline: none;
    box-shadow: var(--sh-sm), 0 0 0 4px rgba(255, 153, 51, 0.45);
  }

  /* Disabled state — visually consistent across all buttons */
  button:disabled, .gs-disabled {
    opacity: 0.45;
    cursor: not-allowed;
    filter: grayscale(0.4);
  }
</style>

/* RAG-style retrieval: lowercase keyword scan across keys + en + gu */
function ragLookup(query) {
  if (!query) return null;
  const q = query.toLowerCase();
  for (const f of KB.facts) {
    for (const k of f.keys) {
      if (q.includes(k.toLowerCase())) return { gu: f.gu, en: f.en };
    }
  }
  for (const cat of ['animals','fruits','vegetables','classroom']) {
    for (const it of KB[cat]) {
      if (q.includes(it.en) || q.includes(it.gu)) {
        return { gu: it.story_gu, en: it.story_en };
      }
    }
  }
  return null;
}

// Persist a value to localStorage under a key.
function usePersistedState(key, defaultValue) {
  const [v, setV] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw == null ? defaultValue : JSON.parse(raw);
    } catch { return defaultValue; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
  }, [key, v]);
  return [v, setV];
}

// TTS: speak a Gujarati string then English via Web Speech API.
function useTTS() {
  const [speaking, setSpeaking] = useState(false);
  const voices = useRef([]);

  useEffect(() => {
    if (typeof speechSynthesis === 'undefined') return;
    const load = () => { voices.current = speechSynthesis.getVoices(); };
    load();
    speechSynthesis.onvoiceschanged = load;
    return () => { try { speechSynthesis.cancel(); } catch {} };
  }, []);

  const pickVoice = (langPrefix) =>
    voices.current.find(v => v.lang && v.lang.toLowerCase().startsWith(langPrefix));

  const speak = useCallback((text, lang = 'en') => {
    if (typeof speechSynthesis === 'undefined' || !text) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      const wantPrefix = lang === 'gu' ? 'gu' : (lang === 'hi' ? 'hi' : 'en');
      const v = pickVoice(wantPrefix) || pickVoice('hi') || pickVoice('en');
      if (v) u.voice = v;
      u.lang = v ? v.lang : (wantPrefix === 'gu' ? 'gu-IN' : 'en-IN');
      u.rate = 0.9; u.pitch = 1.05;
      setSpeaking(true);
      u.onend = () => setSpeaking(false);
      u.onerror = () => setSpeaking(false);
      speechSynthesis.speak(u);
    } catch { setSpeaking(false); }
  }, []);

  const speakBilingual = useCallback((gu, en) => {
    if (typeof speechSynthesis === 'undefined') return;
    try {
      speechSynthesis.cancel();
      const guVoice = pickVoice('gu') || pickVoice('hi');
      const enVoice = pickVoice('en');
      const u1 = new SpeechSynthesisUtterance(gu);
      if (guVoice) u1.voice = guVoice;
      u1.lang = guVoice ? guVoice.lang : 'gu-IN';
      u1.rate = 0.85;
      const u2 = new SpeechSynthesisUtterance(en);
      if (enVoice) u2.voice = enVoice;
      u2.lang = enVoice ? enVoice.lang : 'en-IN';
      u2.rate = 0.9;
      setSpeaking(true);
      u1.onend = () => speechSynthesis.speak(u2);
      u2.onend = () => setSpeaking(false);
      u2.onerror = u1.onerror = () => setSpeaking(false);
      speechSynthesis.speak(u1);
    } catch { setSpeaking(false); }
  }, []);

  const stop = useCallback(() => {
    try { speechSynthesis.cancel(); } catch {}
    setSpeaking(false);
  }, []);

  return { speak, speakBilingual, stop, speaking };
}

/* useSound: procedurally synthesised feedback chimes via Web Audio API.
   No audio files shipped — keeps APK small and 100% offline. */
function useSound(enabled) {
  const ctxRef = useRef(null);
  const ensure = () => {
    if (!enabled) return null;
    if (!ctxRef.current) {
      const A = window.AudioContext || window.webkitAudioContext;
      if (!A) return null;
      ctxRef.current = new A();
    }
    if (ctxRef.current.state === 'suspended') ctxRef.current.resume();
    return ctxRef.current;
  };

  const tone = (freq, dur = 0.18, type = 'sine', gain = 0.18, when = 0) => {
    const ctx = ensure();
    if (!ctx) return;
    const t0 = ctx.currentTime + when;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(ctx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  };

  return useMemo(() => ({
    success: () => { tone(660, 0.12); tone(880, 0.18, 'sine', 0.18, 0.1); tone(1320, 0.22, 'sine', 0.14, 0.2); },
    error:   () => { tone(220, 0.16, 'sawtooth', 0.1); tone(180, 0.2, 'sawtooth', 0.08, 0.15); },
    tap:     () => { tone(520, 0.05, 'square', 0.06); },
    chime:   () => { tone(523, 0.1); tone(659, 0.1, 'sine', 0.18, 0.08); tone(784, 0.18, 'sine', 0.16, 0.16); },
    levelUp: () => {
      [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.16, 'triangle', 0.18, i * 0.09));
    },
  }), [enabled]);
}

// Camera: live video stream using getUserMedia. Falls back to mock mode.
function useCamera(active) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [state, setState] = useState('idle'); // idle | live | denied | unsupported

  useEffect(() => {
    if (!active) {
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
      setState('idle');
      return;
    }
    let cancelled = false;
    (async () => {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setState('unsupported'); return;
      }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false,
        });
        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          await videoRef.current.play().catch(() => {});
        }
        setState('live');
      } catch {
        setState('denied');
      }
    })();
    return () => {
      cancelled = true;
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
        streamRef.current = null;
      }
    };
  }, [active]);

  return { videoRef, state };
}

function Bi({ gu, en, mode = 'both', style = {}, guStyle = {}, enStyle = {}, inline = false }) {
  if (mode === 'gu') return <span style={{ ...style, ...guStyle }}>{gu}</span>;
  if (mode === 'en') return <span style={{ ...style, ...enStyle }}>{en}</span>;
  if (inline) {
    return (
      <span style={style}>
        <span style={guStyle}>{gu}</span>
        <span style={{ opacity: 0.6, margin: '0 6px' }}>·</span>
        <span style={enStyle}>{en}</span>
      </span>
    );
  }
  return (
    <span style={{ display: 'block', ...style }}>
      <span style={{ display: 'block', ...guStyle }}>{gu}</span>
      <span style={{ display: 'block', opacity: 0.7, fontWeight: 500, fontSize: '0.7em', ...enStyle }}>{en}</span>
    </span>
  );
}

/* Inline SVG renderer. Accepts both legacy "mdi:foo" and bare "foo" lookup keys. */
function Iconify({ icon, size = 28, color = 'currentColor', fallback, style = {} }) {
  const key = (icon || '').replace(/^mdi:/, '');
  const body = ICONS[key];
  if (!body) {
    return <span style={{ fontSize: size * 0.9, color, ...style }}>{fallback || '◇'}</span>;
  }
  return (
    <svg
      width={size}
      height={size}
      viewBox="0 0 24 24"
      style={{ color, display: 'inline-block', verticalAlign: 'middle', ...style }}
      dangerouslySetInnerHTML={{ __html: body }}
    />
  );
}

/* ─────────────────────── CAMERA SCAN ───────────────────────
   Real getUserMedia stream as the viewfinder. Capture grabs a frame
   into a canvas (used as the result thumbnail). Recognition is mocked
   per the user's instruction in chat1.md but cycles through the KB.
*/
function CameraScanScreen({ onBack, lang }) {
  const [phase, setPhase] = useState('viewfinder'); // viewfinder | scanning | result
  const [resultIdx, setResultIdx] = useState(0);
  const [thumb, setThumb] = useState(null);
  const { videoRef, state: camState } = useCamera(phase !== 'result');
  const tts = useTTS();

  const items = [...KB.animals, ...KB.fruits, ...KB.classroom];
  const item = items[resultIdx];

  const capture = () => {
    if (videoRef.current && camState === 'live') {
      try {
        const v = videoRef.current;
        const canvas = document.createElement('canvas');
        const w = v.videoWidth || 320, h = v.videoHeight || 240;
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(v, 0, 0, w, h);
        setThumb(canvas.toDataURL('image/jpeg', 0.7));
      } catch {}
    }
    setPhase('scanning');
    setTimeout(() => setPhase('result'), 1400);
  };

  const reset = () => {
    setResultIdx((resultIdx + 1) % items.length);
    setThumb(null);
    setPhase('viewfinder');
  };

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      background: '#1a1a1a', position: 'relative', overflow: 'hidden',
    }}>
      <div style={{ position: 'absolute', inset: 0 }}>
        {camState === 'live' ? (
          <video ref={videoRef} autoPlay playsInline muted style={{
            width: '100%', height: '100%', objectFit: 'cover', display: 'block',
          }} />
        ) : (
          <div style={{
            position: 'absolute', inset: 0,
            background: 'radial-gradient(ellipse at 50% 55%, #6b8456 0%, #3d5238 45%, #1f2d1c 100%)',
          }}>
            <svg width="100%" height="100%" viewBox="0 0 380 700" style={{ position: 'absolute', inset: 0, opacity: 0.4 }}>
              {Array.from({ length: 40 }).map((_, i) => (
                <line key={i}
                  x1={(i * 31) % 380} y1={500 + (i * 17) % 200}
                  x2={(i * 47) % 380} y2={520 + (i * 23) % 200}
                  stroke="#2a3a23" strokeWidth="2" />
              ))}
            </svg>
            <div style={{
              position: 'absolute', left: '50%', top: '50%',
              transform: 'translate(-50%, -50%)',
              fontSize: 80, opacity: 0.85,
            }}>{item.icon || '📷'}</div>
            <div style={{
              position: 'absolute', bottom: 110, left: 0, right: 0,
              textAlign: 'center', color: '#fff', fontSize: 13, fontWeight: 600,
              opacity: 0.85, padding: '0 32px',
            }}>
              {camState === 'denied'
                ? '⚠️ Camera permission denied · ડેમો મોડ'
                : camState === 'unsupported'
                ? 'Camera not supported · ડેમો મોડ'
                : '...' }
            </div>
            <div style={{
              position: 'absolute', inset: 0, opacity: 0.18,
              backgroundImage: 'radial-gradient(circle, rgba(255,255,255,0.3) 1px, transparent 1px)',
              backgroundSize: '4px 4px',
            }} />
          </div>
        )}
        {/* dark overlay for legibility */}
        {camState === 'live' && (
          <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, rgba(0,0,0,0.35) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.35) 100%)' }} />
        )}
      </div>

      <div style={{
        position: 'relative', zIndex: 5,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '14px 16px',
      }}>
        <button onClick={onBack} className="press" style={{
          width: 44, height: 44, borderRadius: 22,
          background: 'rgba(0,0,0,0.45)', backdropFilter: 'blur(10px)',

/* ─────────────────────── ASK QUESTION ─────────────────────── */

function AskScreen({ onBack, lang }) {
  const [input, setInput] = useState('');
  const [recording, setRecording] = useState(false);
  const [phase, setPhase] = useState('input');
  const [questionAsked, setQuestionAsked] = useState(null);
  const [answer, setAnswer] = useState({ gu: '', en: '' });
  const tts = useTTS();
  const recogRef = useRef(null);

  const presetQuestions = [
    { gu: 'આકાશ વાદળી કેમ છે?', en: 'Why is the sky blue?' },
    { gu: 'સૂર્ય શું છે?', en: 'What is the sun?' },
    { gu: 'મેઘધનુષ કેવી રીતે બને?', en: 'How does a rainbow form?' },
  ];

  const ask = (q) => {
    setQuestionAsked(q);
    setPhase('thinking');
    setTimeout(() => {
      const looked = ragLookup(q.en) || ragLookup(q.gu);
      if (looked) {
        setAnswer(looked);
      } else {
        setAnswer({
          gu: 'સારો પ્રશ્ન! હું હજુ આ વિશે શીખી રહી છું. તારા શિક્ષકને પૂછી જો.',
          en: 'Great question! I am still learning about that. Ask your teacher!',
        });
      }
      setPhase('answer');
    }, 1400);
  };

  const reset = () => {
    setPhase('input');
    setInput('');
    setQuestionAsked(null);
  };

  // Web Speech API recognition (when supported)
  const toggleRecord = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      // No speech recognition — fall back to a friendly preset
      if (recording) {
        setRecording(false);
        return;
      }
      setRecording(true);
      setTimeout(() => {
        setRecording(false);
        ask({ gu: 'આકાશ વાદળી કેમ છે?', en: 'Why is the sky blue?' });
      }, 1800);
      return;
    }
    if (recording && recogRef.current) {
      recogRef.current.stop();
      return;
    }
    const r = new SR();
    r.lang = lang === 'en' ? 'en-IN' : 'gu-IN';
    r.continuous = false;
    r.interimResults = false;
    r.onresult = (ev) => {
      const text = ev.results[0][0].transcript;
      ask({ gu: text, en: text });
    };
    r.onend = () => { setRecording(false); recogRef.current = null; };
    r.onerror = () => { setRecording(false); recogRef.current = null; };
    recogRef.current = r;
    setRecording(true);
    try { r.start(); } catch { setRecording(false); }
  };

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      background: 'linear-gradient(180deg, #E8F8E5 0%, #FFFAF2 30%)',
      overflow: 'hidden',
    }}>
      <ScreenHeader
        onBack={onBack}
        gu="પ્રશ્ન પૂછો"
        en="Ask a Question"
        lang={lang}
        right={<Owl size={48} mood="thinking" />}
      />

      <div style={{ flex: 1, padding: '4px 16px 12px', overflowY: 'auto', display: 'flex', flexDirection: 'column' }}>
        {phase === 'input' && (
          <>
            <div className="fade-in" style={{
              background: '#fff', borderRadius: 20,
              border: '2.5px solid var(--green)',
              padding: '14px 16px', marginBottom: 16,
            }}>
              <div style={{ fontSize: 17, fontWeight: 700, color: 'var(--ink)', lineHeight: 1.3 }}>
                મને કંઈપણ પૂછો!
              </div>
              <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink-soft)', marginTop: 2 }}>
                Ask me anything!
              </div>
            </div>

            <div style={{
              fontSize: 11, fontWeight: 800, letterSpacing: '0.08em',
              color: 'var(--ink-soft)', textTransform: 'uppercase',
              marginBottom: 8,
              display: 'flex', alignItems: 'center', gap: 6,
            }}>
              <span style={{ fontSize: 14, lineHeight: 1, letterSpacing: 0 }}>💭</span>
              <span>સૂચનો · Try these</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 16 }}>
              {presetQuestions.map((q, i) => (
                <button key={i} onClick={() => ask(q)} className="press" style={{
                  background: '#fff', border: '2px solid var(--line)',
                  borderRadius: 16, padding: '12px 14px',
                  textAlign: 'left',
                  display: 'flex', alignItems: 'center', gap: 10,
                }}>
                  <div style={{ fontSize: 22 }}>{['🌤️', '☀️', '🌈'][i]}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: 'var(--ink)', lineHeight: 1.2 }}>
                      {q.gu}
                    </div>
                    <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--ink-soft)', marginTop: 1 }}>
                      {q.en}
                    </div>
                  </div>
                  <div style={{ fontSize: 18, color: 'var(--ink-soft)' }}>›</div>
                </button>
              ))}
            </div>

            <div style={{ marginTop: 'auto' }}>
              <div className="ask-input" style={{
                background: '#fff', borderRadius: 22,
                border: '2.5px solid var(--ink)',
                boxShadow: '0 4px 0 var(--ink)',
                padding: '4px 4px 4px 16px',
                display: 'flex', alignItems: 'center', gap: 8,
              }}>
                <input
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  placeholder="અહીં લખો... · Type here..."
                  style={{
                    flex: 1, border: 'none', outline: 'none',
                    fontSize: 16, fontWeight: 600,
                    fontFamily: 'inherit', color: 'var(--ink)',
                    padding: '12px 0', background: 'transparent', minWidth: 0,
                  }}
                  onKeyDown={e => e.key === 'Enter' && input.trim() && ask({ gu: input, en: input })}
                />
                {input.trim() ? (
                  <button onClick={() => ask({ gu: input, en: input })} className="press" style={{
                    width: 44, height: 44, borderRadius: 22,
                    background: 'var(--green)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                    <Icon.Send size={22} color="#fff" />
                  </button>
                ) : (
                  <button onClick={toggleRecord} className={recording ? 'mic-recording' : ''} style={{
                    width: 44, height: 44, borderRadius: 22,
                    background: recording ? 'var(--pink)' : 'var(--saffron)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                  }}>
                    <Icon.Mic size={22} color="#fff" />
                  </button>
                )}
              </div>
              <div style={{ textAlign: 'center', fontSize: 12, fontWeight: 600, color: 'var(--ink-soft)', marginTop: 8 }}>
                {recording ? '🔴 સાંભળી રહ્યું છે... · Listening...' : 'માઇક દબાવો અથવા લખો · Tap mic or type'}
              </div>
            </div>
          </>
        )}

        {phase === 'thinking' && (
          <div style={{
            flex: 1, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 16,
          }}>
            <div className="bobbing"><Owl size={120} mood="thinking" /></div>
            <div style={{ fontSize: 20, fontWeight: 700, color: 'var(--ink)' }}>
              વિચારી રહ્યું છું...
            </div>
            <div style={{ fontSize: 13, color: 'var(--ink-soft)', fontWeight: 600 }}>
              Thinking...
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              {[0, 1, 2].map(i => (
                <div key={i} style={{
                  width: 10, height: 10, borderRadius: 5,
                  background: 'var(--saffron)',
                  animation: `bob 0.9s ease-in-out ${i * 0.15}s infinite`,
                }} />
              ))}
            </div>
          </div>
        )}

        {phase === 'answer' && (
          <div className="fade-in" style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            <div style={{ alignSelf: 'flex-end', maxWidth: '85%' }}>
              <div style={{
                background: 'var(--saffron)', color: '#fff',
                borderRadius: '20px 20px 4px 20px',
                padding: '10px 14px',
                fontSize: 15, fontWeight: 700,
                boxShadow: '0 2px 0 var(--saffron-deep)',
              }}>{questionAsked.gu}</div>
            </div>

            <div style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
              <Owl size={48} mood="happy" />
              <div style={{ flex: 1 }}>
                <div style={{
                  background: '#fff',
                  borderRadius: '20px 20px 20px 4px',
                  border: '2.5px solid var(--green)',
                  padding: '14px 16px',
                  boxShadow: '0 3px 0 var(--green-deep)',
                }}>
                  <div style={{ fontSize: 17, fontWeight: 700, color: 'var(--ink)', lineHeight: 1.4 }}>
                    {answer.gu}
                  </div>
                  <div style={{
                    marginTop: 8, paddingTop: 8,
                    borderTop: '1.5px dashed var(--line)',
                    fontSize: 13, fontWeight: 500, color: 'var(--ink-soft)', lineHeight: 1.4,
                  }}>{answer.en}</div>
                  <button
                    onClick={() => tts.speakBilingual(answer.gu, answer.en)}
                    className="press" style={{
                    marginTop: 10, padding: '6px 10px',
                    background: 'var(--green-soft)', borderRadius: 12,
                    border: '1.5px solid var(--green)',
                    display: 'inline-flex', alignItems: 'center', gap: 6,
                  }}>
                    <Icon.Speaker size={16} color="var(--green-deep)" />
                    <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--green-deep)' }}>
                      {tts.speaking ? '⏸ બંધ · Stop' : 'સાંભળો · Listen'}
                    </span>
                  </button>
                </div>
              </div>
            </div>

            <div style={{ display: 'flex', gap: 8, marginTop: 4 }}>
              <button onClick={reset} className="press btn-chunky" style={{
                flex: 1, padding: '12px',
                background: 'var(--purple)', color: '#fff',
                fontSize: 14, fontWeight: 700,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
              }}>
                <span style={{ fontSize: 16, lineHeight: 1 }}>✨</span>
                <span>બીજો પ્રશ્ન · Ask another</span>
              </button>
              <button onClick={reset} className="press btn-chunky" style={{
                padding: '12px 16px',
                background: '#fff', color: 'var(--ink)',
                fontSize: 14, fontWeight: 700,
              }}>↻</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─────────────────────── MATCH PAIRS GAME ─────────────────────── */

function MatchScreen({ onBack, onWin, lang, sound }) {
  const tts = useTTS();
  const fx = useSound(sound);

  // Random 5 from animals + fruits
  const pool = useMemo(() => {
    const all = [...KB.animals, ...KB.fruits, ...KB.classroom];
    const shuffled = [...all].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, 5);
  }, []);

  const [leftCol, rightCol] = useMemo(() => [
    [...pool].sort(() => Math.random() - 0.5),
    [...pool].sort(() => Math.random() - 0.5),
  ], [pool]);

  const [pickedLeft, setPickedLeft] = useState(null);
  const [pickedRight, setPickedRight] = useState(null);
  const [matched, setMatched] = useState(new Set());
  const [wrong, setWrong] = useState(null);

  useEffect(() => {
    if (pickedLeft && pickedRight) {
      if (pickedLeft.en === pickedRight.en) {
        fx.success();
        setMatched(new Set([...matched, pickedLeft.en]));
        setPickedLeft(null); setPickedRight(null);
        if (matched.size + 1 === pool.length) {
          fx.levelUp();
          setTimeout(() => onWin(pool.length), 700);
        }
      } else {
        fx.error();
        setWrong({ l: pickedLeft.en, r: pickedRight.en });
        setTimeout(() => {
          setPickedLeft(null); setPickedRight(null); setWrong(null);
        }, 700);
      }
    }
  }, [pickedLeft, pickedRight]);

  const cardStyle = (item, side) => {
    const isMatched = matched.has(item.en);
    const isPicked = side === 'L' ? pickedLeft === item : pickedRight === item;
    const isWrong = wrong && (side === 'L' ? wrong.l === item.en : wrong.r === item.en);
    return {
      background: isMatched ? 'var(--green-soft)' : isWrong ? 'var(--pink-soft)' : isPicked ? 'var(--saffron-soft)' : '#fff',
      border: `3px solid ${isMatched ? 'var(--green)' : isWrong ? 'var(--pink)' : isPicked ? 'var(--saffron)' : 'var(--ink)'}`,
      boxShadow: `0 4px 0 ${isMatched ? 'var(--green-deep)' : isWrong ? 'var(--pink-deep)' : isPicked ? 'var(--saffron-deep)' : 'var(--ink)'}`,
      opacity: isMatched ? 0.65 : 1,
      borderRadius: 18,
      padding: '10px 6px',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      flexDirection: 'column', gap: 3,
      flex: 1, minHeight: 0,
      transition: 'all 0.2s',
      pointerEvents: isMatched ? 'none' : 'auto',
    };
  };

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      background: 'linear-gradient(180deg, #FFE0E9 0%, #FFFAF2 40%)',
      padding: '14px 16px 16px', overflow: 'hidden',
    }}>
      <ScreenHeader
        onBack={onBack}
        gu={<><span style={{ marginRight: 'var(--sp-2)' }}>🧩</span>જોડી મેળવો</>}
        en="Match the pairs"
        lang={lang}
        right={(
          <div className="gs-chip" style={{
            background: 'var(--green-soft)',
            border: 'var(--bw) solid var(--green)',
            color: 'var(--green-deep)',
            fontWeight: 800,
            fontSize: 'var(--fs-base)',
          }}>{matched.size}/{pool.length}</div>
        )}
      />

      <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--ink-soft)', textAlign: 'center', marginBottom: 8 }}>
        ગુજરાતી ↔ English · Tap pairs to match
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, flex: 1 }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {leftCol.map((it, i) => (
            <button key={'L'+i} onClick={() => { fx.tap(); setPickedLeft(it); }}
              className={`press stagger-in${wrong && wrong.l === it.en ? ' shake' : ''}`}
              style={{ ...cardStyle(it, 'L'), animationDelay: `${i * 55}ms` }}>
              <div style={{ fontSize: 26, lineHeight: 1 }}>{it.icon || '✨'}</div>
              <div style={{ fontSize: 17, fontWeight: 800, color: 'var(--ink)', lineHeight: 1 }}>
                {it.gu}
              </div>
            </button>
          ))}
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {rightCol.map((it, i) => (
            <button key={'R'+i} onClick={() => { fx.tap(); setPickedRight(it); }}
              className={`press stagger-in${wrong && wrong.r === it.en ? ' shake' : ''}`}
              style={{ ...cardStyle(it, 'R'), animationDelay: `${120 + i * 55}ms` }}>
              <div style={{ fontSize: 14, fontWeight: 800, color: 'var(--ink)', textTransform: 'capitalize' }}>
                {it.en}
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

/* Pick N random questions per session for replayability */
function pickQuiz(n) {
  const arr = [...QUIZ_QUESTIONS].sort(() => Math.random() - 0.5);
  return arr.slice(0, Math.min(n, arr.length));
}

function QuizScreen({ onBack, onComplete, lang, sound, onCorrectStreak, onWrongAnswer }) {
  const questions = useMemo(() => pickQuiz(5), []);
  const fx = useSound(sound);
  const [qIdx, setQIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showFeedback, setShowFeedback] = useState(false);
  const [stars, setStars] = useState(0);
  const q = questions[qIdx];
  const total = questions.length;

  const pick = (i) => {
    if (selected !== null) return;
    setSelected(i);
    const isCorrect = q.options[i].correct;
    setShowFeedback(true);
    if (isCorrect) {
      fx.success();
      setStars(s => s + 1);
      onCorrectStreak && onCorrectStreak();
    } else {
      fx.error();
      onWrongAnswer && onWrongAnswer();
    }

    setTimeout(() => {
      if (qIdx + 1 < total) {
        setQIdx(qIdx + 1);
        setSelected(null);
        setShowFeedback(false);
      } else {
        if (stars + (isCorrect ? 1 : 0) === total) fx.levelUp();
        onComplete(stars + (isCorrect ? 1 : 0), total);
      }
    }, 1800);
  };

  const optionColors = [
    { bg: '#FFB85C', deep: '#F37820' },
    { bg: '#6BD662', deep: '#138808' },
    { bg: '#4FC3F7', deep: '#0288D1' },
    { bg: '#FF6F91', deep: '#D14570' },
  ];

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      background: 'linear-gradient(180deg, #EDE3FA 0%, #FFFAF2 40%)',
      padding: '14px 16px 16px', overflow: 'hidden',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
        <button onClick={onBack} className="press" style={{
          width: 44, height: 44, borderRadius: 22,
          background: '#fff', border: '2.5px solid var(--ink)',
          boxShadow: '0 3px 0 var(--ink)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <Icon.Back size={22} color="var(--ink)" />
        </button>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', color: 'var(--ink-soft)', textTransform: 'uppercase' }}>
            પ્રશ્ન · Question {qIdx + 1}/{total}
          </div>
          <div style={{
            marginTop: 4, height: 10, borderRadius: 5,
            background: '#fff', border: '2px solid var(--ink)',
            overflow: 'hidden',
          }}>
            <div style={{
              height: '100%',
              width: `${((qIdx + (showFeedback ? 1 : 0)) / total) * 100}%`,
              background: 'linear-gradient(90deg, #9C6ADE, #FF9933)',
              transition: 'width 0.4s',
            }} />
          </div>
        </div>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 4,
          background: 'var(--yellow-soft)', padding: '6px 10px',
          borderRadius: 999, border: '2px solid var(--yellow)',
        }}>
          <Icon.Star size={18} />
          <span style={{ fontSize: 16, fontWeight: 800, color: 'var(--ink)' }}>{stars}</span>
        </div>
      </div>

      <div key={qIdx} className="pop-in" style={{
        background: '#fff', borderRadius: 24,
        border: '3px solid var(--ink)',
        boxShadow: '0 5px 0 var(--ink)',
        padding: '18px', marginBottom: 14,
        textAlign: 'center',

        <div style={{

          display: 'flex', alignItems: 'center', justifyContent: 'center',

        }}>{q.image}</div>
        <div style={{ fontSize: 19, fontWeight: 800, color: 'var(--ink)', lineHeight: 1.2 }}>
          {q.gu}
        </div>
        {lang !== 'gu' && (
          <div style={{ fontSize: 13, fontWeight: 600, color: 'var(--ink-soft)', marginTop: 4 }}>
            {q.en}

        )}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, flex: 1 }}>

          const c = optionColors[i];
          const isSelected = selected === i;
          const isCorrect = opt.correct;
          let bg = c.bg, border = 'var(--ink)', shadow = c.deep;
          let textColor = '#fff';
          if (showFeedback) {
            if (isCorrect) { bg = 'var(--green)'; shadow = 'var(--green-deep)'; }
            else if (isSelected) { bg = '#999'; shadow = '#666'; }
            else { bg = '#E8E0D4'; shadow = '#B8AC9A'; textColor = 'var(--ink-soft)'; }
          }
          return (
            <button key={i} onClick={() => pick(i)}
              className={`press stagger-in${showFeedback && isSelected && !isCorrect ? ' shake' : ''}`}
              style={{

              boxShadow: `0 5px 0 ${shadow}`,

                  <Icon.Check size={20} color="var(--green-deep)" />

              )}
              {showFeedback && isSelected && !isCorrect && (
                <div className="star-pop" style={{
                  position: 'absolute', top: -10, right: -10,
                  width: 32, height: 32, borderRadius: 16,
                  background: '#fff', border: '2.5px solid var(--pink-deep)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>
                  <Icon.Cross size={20} color="var(--pink-deep)" />
                </div>

            </button>

        })}
      </div>

      {showFeedback && (
        <div className="slide-up" style={{
          marginTop: 12, padding: '10px 14px',
          background: q.options[selected].correct ? 'var(--green-soft)' : 'var(--pink-soft)',
          border: `2.5px solid ${q.options[selected].correct ? 'var(--green)' : 'var(--pink)'}`,

            <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--ink-soft)' }}>
              {q.options[selected].correct ? 'Wahoo! Well done!' : 'No problem, keep trying!'}

          </div>
        </div>
      )}

  );

  useEffect(() => {
    const colors = ['#FF9933', '#138808', '#FFD43B', '#9C6ADE', '#FF6F91', '#4FC3F7'];
    const c = Array.from({ length: 30 }).map((_, i) => ({
      id: i,
      left: (i * 13.7) % 100,
      delay: (i % 8) * 0.1,
      duration: 2 + ((i % 5) * 0.4),
      color: colors[i % colors.length],
      size: 8 + ((i % 4) * 2),
    }));
    setConfetti(c);
  }, []);

  const percent = stars / total;
  const message = percent === 1
    ? { gu: 'સંપૂર્ણ ગુણ!', en: 'Perfect score!' }
    : percent >= 0.5
      ? { gu: 'શાબાશ!', en: 'Well done!' }
      : { gu: 'સારો પ્રયત્ન!', en: 'Good try!' };

  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      background: 'linear-gradient(160deg, #FFD43B 0%, #FF9933 100%)',
      padding: 24, position: 'relative', overflow: 'hidden',
    }}>
      {confetti.map(c => (
        <div key={c.id} style={{
          position: 'absolute', top: -20,
          left: `${c.left}%`,
          width: c.size, height: c.size,
          background: c.color, borderRadius: c.id % 2 ? '50%' : 2,
          animation: `confetti-fall ${c.duration}s ${c.delay}s linear infinite`,
        }} />
      ))}

      <div className="bobbing"><Owl size={140} mood="cheering" wave={true} /></div>

      <div className="pop-in" style={{
        textAlign: 'center', marginTop: 16, color: '#fff',
        textShadow: '0 3px 0 rgba(0,0,0,0.2)',
      }}>
        <div style={{ fontSize: 44, fontWeight: 800, lineHeight: 1 }}>{message.gu}</div>
        <div style={{ fontSize: 22, fontWeight: 700, marginTop: 4, opacity: 0.95 }}>{message.en}</div>
      </div>

      <div style={{ display: 'flex', gap: 12, marginTop: 30 }}>
        {Array.from({ length: total }).map((_, i) => (
          <div key={i} className="star-pop" style={{ animationDelay: `${0.4 + i * 0.2}s` }}>
            <Icon.Star size={56} filled={i < stars} color={i < stars ? '#FFD43B' : '#fff'} />
          </div>
        ))}
      </div>

      <div style={{
        marginTop: 24, background: '#fff',
        borderRadius: 20, padding: '14px 22px',
        border: '3px solid var(--ink)',
        boxShadow: '0 4px 0 var(--ink)',
        textAlign: 'center',
      }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--ink-soft)' }}>
          તમે મેળવ્યા · You earned
        </div>
        <div style={{ fontSize: 38, fontWeight: 800, color: 'var(--saffron-deep)', lineHeight: 1.1 }}>
          {stars} / {total} ⭐
        </div>

      <div style={{ display: 'flex', gap: 10, marginTop: 28, width: '100%' }}>
        <button onClick={onRetry} className="press btn-chunky" style={{

  );
}

/* ─────────────────────── APP SHELL ─────────────────────── */

/* Achievement definitions — unlocked by hitting milestones. */
const ACHIEVEMENTS = [
  { id: 'first-star',   gu: 'પહેલો તારો',   en: 'First star',     icon: '⭐', need: { stars: 1 } },
  { id: 'starter',      gu: 'શરૂઆત',         en: 'Starter',        icon: '🌱', need: { stars: 10 } },
  { id: 'fifty-stars',  gu: '૫૦ તારા',       en: '50 stars',       icon: '🌟', need: { stars: 50 } },
  { id: 'century',      gu: '૧૦૦ તારા',     en: '100 stars',      icon: '💯', need: { stars: 100 } },
  { id: 'streak-3',     gu: '૩ સળંગ',        en: '3 in a row',     icon: '🔥', need: { streak: 3 } },
  { id: 'streak-7',     gu: '૭ સળંગ',        en: '7 in a row',     icon: '🚀', need: { streak: 7 } },
  { id: 'matcher',      gu: 'જોડી રાજા',    en: 'Match king',     icon: '🧩', need: { matches: 1 } },
  { id: 'curious',      gu: 'જિજ્ઞાસુ',     en: 'Curious mind',   icon: '🦉', need: { topics: 3 } },
];

function computeUnlocked(stats) {
  return ACHIEVEMENTS.filter(a => {
    for (const k in a.need) if ((stats[k] || 0) < a.need[k]) return false;
    return true;
  }).map(a => a.id);
}

function App() {
  const [lang, setLang] = usePersistedState('gyansetu.lang', 'both');
  const [fontSize, setFontSize] = usePersistedState('gyansetu.fontSize', 'regular');
  const [sound, setSound] = usePersistedState('gyansetu.sound', true);
  const [stars, setStars] = usePersistedState('gyansetu.stars', 48);
  const [streak, setStreak] = usePersistedState('gyansetu.streak', 0);
  const [bestStreak, setBestStreak] = usePersistedState('gyansetu.bestStreak', 0);
  const [matches, setMatches] = usePersistedState('gyansetu.matches', 0);
  const [topicsViewed, setTopicsViewed] = usePersistedState('gyansetu.topicsViewed', 0);
  const [unlocked, setUnlocked] = usePersistedState('gyansetu.unlocked', []);
  const [screen, setScreen] = useState('splash');
  const [quizResult, setQuizResult] = useState(null);
  const [toast, setToast] = useState(null);
  const fx = useSound(sound);

  const stats = { stars, streak: bestStreak, matches, topics: topicsViewed };

  // Re-evaluate achievements when any stat changes; toast on new unlocks.
  useEffect(() => {
    const fresh = computeUnlocked(stats);
    const newOnes = fresh.filter(id => !unlocked.includes(id));
    if (newOnes.length) {
      setUnlocked(fresh);
      const a = ACHIEVEMENTS.find(x => x.id === newOnes[0]);
      fx.levelUp();
      setToast({ icon: a.icon, gu: 'પ્રાપ્ત: ' + a.gu, en: 'Unlocked: ' + a.en });
      setTimeout(() => setToast(null), 2400);
    }
  }, [stars, bestStreak, matches, topicsViewed]);

  const fontScale = fontSize === 'large' ? 1.1 : (fontSize === 'xl' ? 1.2 : 1);
  const navigate = (s) => { if (s === 'topics') setTopicsViewed(v => v + 1); setScreen(s); };

  const onCorrectStreak = () => {
    setStreak(prev => {
      const next = prev + 1;
      if (next > bestStreak) setBestStreak(next);
      return next;
    });
  };
  const onWrongAnswer = () => setStreak(0);

  const screenEl = (() => {
    switch (screen) {
      case 'splash':
        return <SplashScreen onContinue={() => setScreen('loading')} />;
      case 'loading':
        return <LoadingScreen onReady={() => setScreen('home')} />;
      case 'home':
        return <HomeScreen
          onNavigate={navigate} lang={lang} setLang={setLang}
          studentName="કિરણ" stars={stars} streak={streak} />;
      case 'topics':
        return <TopicsScreen onBack={() => setScreen('home')} lang={lang} sound={sound} />;
      case 'match':
        return <MatchScreen
          onBack={() => setScreen('home')}
          onWin={(n) => {
            setStars(s => s + n);
            setMatches(m => m + 1);
            setQuizResult({ stars: n, total: n });
            setScreen('results');
          }}
          lang={lang} sound={sound} />;
      case 'scan':
        return <CameraScanScreen onBack={() => setScreen('home')} lang={lang} />;
      case 'ask':
        return <AskScreen onBack={() => setScreen('home')} lang={lang} />;
      case 'quiz':
        return <QuizScreen
          onBack={() => setScreen('home')}
          onComplete={(s, t) => {
            setQuizResult({ stars: s, total: t });
            setStars(prev => prev + s);
            setScreen('results');
          }}
          lang={lang} sound={sound}
          onCorrectStreak={onCorrectStreak}
          onWrongAnswer={onWrongAnswer} />;
      case 'results':
        return <ResultsScreen
          stars={quizResult.stars}
          total={quizResult.total}
          onHome={() => setScreen('home')}
          onRetry={() => setScreen('quiz')} />;
      case 'settings':
        return <SettingsScreen
          onBack={() => setScreen('home')}
          lang={lang} setLang={setLang}
          fontSize={fontSize} setFontSize={setFontSize}
          sound={sound} setSound={setSound}
          onResetStars={() => { setStars(0); setStreak(0); setBestStreak(0); }} />;
      case 'dashboard':
        return <DashboardScreen
          onBack={() => setScreen('home')}
          stars={stars} streak={streak} bestStreak={bestStreak}
          unlocked={unlocked} />;
      default:
        return null;
    }
  })();

  return (
    <div style={{ '--fs-scale': fontScale, fontSize: `${fontScale * 16}px` }}>
      <Phone screenKey={screen}>{screenEl}</Phone>
      {toast && (
        <div className="pop-in" style={{
          position: 'fixed', left: '50%', bottom: 60,
          transform: 'translateX(-50%)',
          background: 'var(--saffron)', color: '#fff',
          padding: '12px 22px', borderRadius: 999,
          border: '3px solid var(--ink)',
          boxShadow: '0 5px 0 var(--ink)',
          fontSize: 16, fontWeight: 800, zIndex: 1000,
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <span style={{ fontSize: 26 }}>{toast.icon}</span>
          <span>{toast.gu}</span>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
